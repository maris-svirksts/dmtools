name: AI Teammate ADO

# Customize run name to show config and ticket key
run-name: "${{ inputs.config_file }} : ${{ inputs.concurrency_key }}"

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Path to config'
        required: true
      encoded_config:
        description: 'Encoded or JSON Agent Config'
        required: false
      concurrency_key:
        description: 'Ticket key for concurrency grouping (e.g., ADO-123)'
        required: false
        default: 'default'

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  ai-teammate:
    runs-on: ubuntu-latest
    concurrency:
      group: ai-teammate-ado-${{ inputs.config_file }}-${{ inputs.concurrency_key }}
      cancel-in-progress: false

    steps:
      - name: 📋 Job Info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🤖 AI Teammate ADO Workflow Started"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📁 Config File: ${{ inputs.config_file }}"
          echo "🎫 Ticket Key: ${{ inputs.concurrency_key }}"
          if [ -n "${{ inputs.encoded_config }}" ]; then
            echo "📝 Encoded Config: provided"
          else
            echo "📝 Encoded Config: (not provided - using default from config)"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java Environment
        uses: ./.github/actions/setup-java-only
        with:
          cache-key-suffix: '-cursor'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure npm global prefix
        if: vars.AI_AGENT_PROVIDER == 'codemie' || vars.AI_AGENT_PROVIDER == 'copilot'
        run: |
          npm config set prefix ~/.npm-global
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache npm global packages
        if: vars.AI_AGENT_PROVIDER == 'codemie' || vars.AI_AGENT_PROVIDER == 'copilot'
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm-global
            ~/.codemie
            ~/.local/bin
          key: ${{ runner.os }}-npm-global-${{ vars.AI_AGENT_PROVIDER }}-${{ hashFiles('.github/workflows/ai-teammate-ado.yml') }}
          restore-keys: |
            ${{ runner.os }}-npm-global-${{ vars.AI_AGENT_PROVIDER }}-
            ${{ runner.os }}-npm-global-

      - name: Install Cursor CLI
        if: vars.AI_AGENT_PROVIDER != 'codemie' && vars.AI_AGENT_PROVIDER != 'copilot'
        run: |
          echo "Installing Cursor CLI..."
          curl https://cursor.com/install -fsS | bash

          echo "Checking installation locations..."
          ls -la "$HOME/.cursor/" || echo "No .cursor directory"
          ls -la "$HOME/.cursor/bin/" || echo "No .cursor/bin directory"
          ls -la "$HOME/.local/bin/" || echo "No .local/bin directory"

          # Cursor CLI installs to ~/.local/bin, not ~/.cursor/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          # Test installation
          export PATH="$HOME/.local/bin:$PATH"
          if command -v cursor-agent; then
            echo "✅ cursor-agent found at: $(command -v cursor-agent)"
            cursor-agent --version 2>&1 || echo "Version check failed"
          else
            echo "❌ cursor-agent not found after installation"
            echo "Available files in .local/bin:"
            ls -la "$HOME/.local/bin/" 2>/dev/null || echo "Directory does not exist"
          fi

      - name: Install Codemie CLI
        if: vars.AI_AGENT_PROVIDER == 'codemie'
        run: |
          if ! command -v codemie-claude &> /dev/null; then
            echo "📦 Installing Codemie CLI..."
            npm install -g @codemieai/code
          else
            echo "✅ Codemie CLI found in cache"
            codemie-claude --version || echo "Version check failed"
          fi
          codemie install claude --supported
          echo "✅ Codemie CLI ready"
          codemie-claude --version || echo "Version check failed"

      - name: Install Copilot CLI
        if: vars.AI_AGENT_PROVIDER == 'copilot'
        run: |
          if ! command -v github-copilot-cli &> /dev/null; then
            echo "📦 Installing GitHub Copilot CLI..."
            npm install -g @github/copilot
          else
            echo "✅ Copilot CLI already installed (from cache)"
          fi
          echo "✅ Copilot CLI ready"

      - name: Verify Copilot CLI Installation
        if: vars.AI_AGENT_PROVIDER == 'copilot'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || secrets.PAT_TOKEN }}
        run: |
          npx @github/copilot --version || echo "Copilot CLI verification - will be available with token"

      - name: Install DMTools CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/IstiN/dmtools/main/install.sh | bash
          echo "$HOME/.dmtools/bin" >> $GITHUB_PATH

      - name: Verify CLI Installations
        run: |
          dmtools -v || echo "dmtools version check failed"
          if [ "${{ vars.AI_AGENT_PROVIDER }}" = "codemie" ]; then
            codemie-claude --version || echo "codemie-claude version failed"
          elif [ "${{ vars.AI_AGENT_PROVIDER }}" = "copilot" ]; then
            npx @github/copilot --version || echo "copilot version check failed"
          else
            cursor-agent --version || echo "cursor-agent version failed"
          fi

      - name: Configure Git Author
        run: |
          git config --global user.name "AI Teammate"
          git config --global user.email "agent.ai.native@gmail.com"
          echo "✅ Git author configured as AI Teammate"

      - name: Run AI Teammate
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          MODEL: sonnet-4
          AGENT_DISABLE_WATCHDOG: "1"
          PATH: "/home/runner/.local/bin:/home/runner/.dmtools/bin:/bin:/usr/bin:$PATH"
          # Azure DevOps Configuration
          ADO_PAT_TOKEN: ${{ secrets.ADO_PAT_TOKEN }}
          ADO_ORGANIZATION: ${{ vars.ADO_ORGANIZATION }}
          ADO_PROJECT: ${{ vars.ADO_PROJECT }}
          ADO_BASE_PATH: ${{ vars.ADO_BASE_PATH }}
          DEFAULT_TRACKER: "ado"

          # Confluence Configuration
          CONFLUENCE_EMAIL: ${{ secrets.JIRA_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CONFLUENCE_BASE_PATH: ${{ vars.CONFLUENCE_BASE_PATH }}
          CONFLUENCE_DEFAULT_SPACE: ${{ vars.CONFLUENCE_DEFAULT_SPACE }}
          CONFLUENCE_GRAPHQL_PATH: ${{ vars.CONFLUENCE_GRAPHQL_PATH }}

          # DMTools Integration Settings
          DMTOOLS_INTEGRATIONS: "ado,confluence,ai,cli,file"

          # AI Service Configuration
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_DEFAULT_MODEL: ${{ vars.GEMINI_DEFAULT_MODEL }}
          PROMPT_CHUNK_TOKEN_LIMIT: ${{ vars.PROMPT_CHUNK_TOKEN_LIMIT }}
          ENCODED_CONFIG: ${{ inputs.encoded_config }}

          # GitHub Authentication for PR creation
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

          # GitHub Copilot CLI Authentication
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || secrets.PAT_TOKEN }}
          COPILOT_MODEL: ${{ vars.COPILOT_MODEL }}

          # AI Agent Provider
          AI_AGENT_PROVIDER: ${{ vars.AI_AGENT_PROVIDER }}

          # Codemie Configuration
          CODEMIE_API_KEY: ${{ secrets.CODEMIE_API_KEY }}
          CODEMIE_BASE_URL: ${{ vars.CODEMIE_BASE_URL }}
          CODEMIE_MODEL: ${{ vars.CODEMIE_MODEL }}
          CODEMIE_MAX_TURNS: ${{ vars.CODEMIE_MAX_TURNS }}

        run: |
          echo "Using configuration: ${{ inputs.config_file }}"
          CI_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "CI run URL: ${CI_RUN_URL}"

          if [ -n "${ENCODED_CONFIG}" ]; then
            echo "Encoded config received (raw):"
            printf '%s\n' "${ENCODED_CONFIG}"
            dmtools run "${{ inputs.config_file }}" "${ENCODED_CONFIG}" --ciRunUrl "${CI_RUN_URL}"
          else
            echo "No encoded config provided."
            dmtools run "${{ inputs.config_file }}" --ciRunUrl "${CI_RUN_URL}"
          fi

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Path to config'
        required: true
      encoded_config:
        description: 'Encoded or JSON Agent Config'
        required: false

permissions:
  contents: write
  pull-requests: write
  actions: read
  
jobs:
  cursor-agent:
    runs-on: ubuntu-latest
    concurrency:
      group: cursor-agent-ado-${{ inputs.config_file }}
      cancel-in-progress: false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java Environment
      uses: ./.github/actions/setup-java-only
      with:
        cache-key-suffix: '-cursor'

    - name: Install Cursor CLI
      run: |
        echo "Installing Cursor CLI..."
        curl https://cursor.com/install -fsS | bash
        
        echo "Checking installation locations..."
        ls -la "$HOME/.cursor/" || echo "No .cursor directory"
        ls -la "$HOME/.cursor/bin/" || echo "No .cursor/bin directory"
        ls -la "$HOME/.local/bin/" || echo "No .local/bin directory"
        
        # Cursor CLI installs to ~/.local/bin, not ~/.cursor/bin
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        
        # Test installation
        export PATH="$HOME/.local/bin:$PATH"
        if command -v cursor-agent; then
          echo "✅ cursor-agent found at: $(command -v cursor-agent)"
          cursor-agent --version 2>&1 || echo "Version check failed"
        else
          echo "❌ cursor-agent not found after installation"
          echo "Available files in .local/bin:"
          ls -la "$HOME/.local/bin/" 2>/dev/null || echo "Directory does not exist"
        fi

    - name: Install DMTools CLI
      run: |
        curl -fsSL https://raw.githubusercontent.com/IstiN/dmtools/main/install.sh | bash
        echo "$HOME/.dmtools/bin" >> $GITHUB_PATH

    - name: Build and Install DMTools CLI from source
      run: |
        dmtools || echo "dmtools version failed"
        cursor-agent --version || echo "cursor-agent version failed"

    - name: Run AI Teammate
      env:
        CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        MODEL: sonnet-4
        AGENT_DISABLE_WATCHDOG: "1"
        PATH: "/home/runner/.local/bin:/home/runner/.dmtools/bin:/bin:/usr/bin:$PATH"
        # Azure DevOps Configuration
        ADO_PAT_TOKEN: ${{ secrets.ADO_PAT_TOKEN }}
        ADO_ORGANIZATION: ${{ vars.ADO_ORGANIZATION }}
        ADO_PROJECT: ${{ vars.ADO_PROJECT }}
        ADO_BASE_PATH: ${{ vars.ADO_BASE_PATH }}
        DEFAULT_TRACKER: "ado"

        # Confluence Configuration
        CONFLUENCE_EMAIL: ${{ secrets.JIRA_EMAIL }}
        CONFLUENCE_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        CONFLUENCE_BASE_PATH: ${{ vars.CONFLUENCE_BASE_PATH }}
        CONFLUENCE_DEFAULT_SPACE: ${{ vars.CONFLUENCE_DEFAULT_SPACE }}
        CONFLUENCE_GRAPHQL_PATH: ${{ vars.CONFLUENCE_GRAPHQL_PATH }}

        # DMTools Integration Settings
        DMTOOLS_INTEGRATIONS: "ado,confluence,ai,cli,file"

        # AI Service Configuration
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_DEFAULT_MODEL: ${{ vars.GEMINI_DEFAULT_MODEL }}
        PROMPT_CHUNK_TOKEN_LIMIT: ${{ vars.PROMPT_CHUNK_TOKEN_LIMIT }}
        ENCODED_CONFIG: ${{ inputs.encoded_config }}
        
        # GitHub Authentication for PR creation
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      run: |
        echo "Using configuration: ${{ inputs.config_file }}"
        CI_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        echo "CI run URL: ${CI_RUN_URL}"

        if [ -n "${ENCODED_CONFIG}" ]; then
          echo "Encoded config received (raw):"
          printf '%s\n' "${ENCODED_CONFIG}"
          dmtools run "${{ inputs.config_file }}" "${ENCODED_CONFIG}" --ciRunUrl "${CI_RUN_URL}"
        else
          echo "No encoded config provided."
          dmtools run "${{ inputs.config_file }}" --ciRunUrl "${CI_RUN_URL}"
        fi
